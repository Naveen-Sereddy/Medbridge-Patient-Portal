<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
.lbl{font-size:11px;color:var(--fg-3);margin-top:10px}.wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
</style></head><body><div style="display:flex;flex-direction:column;gap:10px">
<div class="alert alert-info"><i data-lucide="info" style="width:20px;height:20px"></i><div><div class="alert-title">Check your spam folder</div><div style="color:var(--fg-2)">Reset emails sometimes land in spam.</div></div></div>
<div class="alert alert-warn"><i data-lucide="triangle-alert" style="width:20px;height:20px"></i><div><div class="alert-title">2 items need your attention</div></div></div>
<div class="alert alert-success"><i data-lucide="circle-check" style="width:20px;height:20px"></i><div><div class="alert-title">2FA is enabled</div></div></div>
</div><div class="lbl">Inline banners — info · warning · success · danger. Icon always pairs the color (never color-only).</div><script>window.lucide&&lucide.createIcons()</script></body></html>
