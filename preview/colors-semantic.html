<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
.lbl{font-size:11px;color:var(--fg-3);margin-top:6px}.mono{font-variant-numeric:tabular-nums}
.pair{flex:1;border-radius:8px;overflow:hidden;border:1px solid var(--border)}</style></head><body>
<div style="display:flex;gap:10px">
<div class="pair"><div style="height:34px;background:var(--teal-bg)"></div><div style="height:34px;background:var(--teal-600)"></div><div class="lbl" style="padding:5px 7px;font-weight:600;color:var(--fg-2)">Teal</div></div><div class="pair"><div style="height:34px;background:var(--green-bg)"></div><div style="height:34px;background:var(--green-600)"></div><div class="lbl" style="padding:5px 7px;font-weight:600;color:var(--fg-2)">Success</div></div><div class="pair"><div style="height:34px;background:var(--amber-bg)"></div><div style="height:34px;background:var(--amber-700)"></div><div class="lbl" style="padding:5px 7px;font-weight:600;color:var(--fg-2)">Warning</div></div><div class="pair"><div style="height:34px;background:var(--red-bg)"></div><div style="height:34px;background:var(--red-700)"></div><div class="lbl" style="padding:5px 7px;font-weight:600;color:var(--fg-2)">Danger</div></div><div class="pair"><div style="height:34px;background:var(--purple-bg)"></div><div style="height:34px;background:var(--purple-700)"></div><div class="lbl" style="padding:5px 7px;font-weight:600;color:var(--fg-2)">Info</div></div>
</div><div class="lbl" style="margin-top:12px">Each semantic accent pairs a saturated foreground (bottom) with a 50-tint background (top). Used only to carry meaning.</div><script>window.lucide&&lucide.createIcons()</script></body></html>
