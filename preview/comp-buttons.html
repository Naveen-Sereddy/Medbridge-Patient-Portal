<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
.lbl{font-size:11px;color:var(--fg-3);margin-top:10px}.wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
</style></head><body>
<div class="wrap">
<button class="btn btn-primary"><i data-lucide="calendar-plus" style="width:18px;height:18px"></i>Book Appointment</button>
<button class="btn btn-secondary">Join Telehealth</button>
<button class="btn btn-outline">Reschedule</button>
<button class="btn btn-outline-gray">Filter</button>
<button class="btn btn-ghost">Details</button>
<button class="btn btn-danger">Cancel</button>
</div>
<div class="wrap" style="margin-top:12px">
<button class="btn btn-primary btn-sm">Small</button>
<button class="btn btn-primary">Default</button>
<button class="btn btn-primary btn-lg">Large</button>
<button class="btn-icon"><i data-lucide="bell" style="width:19px;height:19px"></i></button>
</div>
<div class="lbl">Primary · Secondary(teal) · Outline · Outline-gray · Ghost · Danger — three sizes + icon button.</div><script>window.lucide&&lucide.createIcons()</script></body></html>
