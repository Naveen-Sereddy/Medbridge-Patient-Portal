<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
.lbl{font-size:11px;color:var(--fg-3);margin-top:10px}.wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
</style></head><body>
<div style="display:flex;gap:16px;align-items:flex-end">
<div class="field" style="flex:1"><label class="field-label">Email address</label>
<div class="input-group"><i data-lucide="mail" class="input-icon" style="width:18px;height:18px"></i><input class="input" value="sarah.johnson@email.com"></div></div>
<div class="field" style="width:200px"><label class="field-label">Date</label><input class="input" placeholder="Select date"></div>
</div>
<div style="display:flex;gap:16px;align-items:center;margin-top:14px">
<div class="search" style="flex:1"><i data-lucide="search" style="width:17px;height:17px;color:var(--n-400)"></i><input placeholder="Search records…"></div>
</div>
<div class="lbl">Field + label + icon · 44px tall · 8px radius · brand focus ring.</div><script>window.lucide&&lucide.createIcons()</script></body></html>
